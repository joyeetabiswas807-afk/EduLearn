<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h2>EduLearn</h2>
</nav>

<div class="container">
<div class="card">

<h2>Student Login</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit" class="btn">
Login
</button>

</form>

<p id="message"></p>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>
</div>

<script>

const API_URL = "https://edulearn-mo38.onrender.com";

document
.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try {

        const response = await fetch(
            `${API_URL}/login`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const result = await response.json();

        const message =
        document.getElementById("message");

        if(result.success){

            localStorage.setItem(
                "userName",
                result.user.name
            );

            localStorage.setItem(
                "userEmail",
                result.user.email
            );

            message.innerHTML =
            "✅ Login successful!";

            setTimeout(() => {
                window.location.href =
                "dashboard.html";
            }, 1000);

        } else {

            message.innerHTML =
            "❌ " + result.message;
        }

    } catch(error){

        document.getElementById("message")
        .innerHTML =
        "❌ Unable to connect to server";
    }

});

</script>

</body>
</html>
